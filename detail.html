<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Local Bank Transfer</title>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }
    
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .modal {
      background: white;
      max-width: 520px;
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 25px;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .header h3 {
      font-size: 16px;
      font-weight: 600;
    }
    
    .header span {
      font-size: 13px;
      color: #777;
    }
    
    .close {
      font-size: 18px;
      cursor: pointer;
    }
    
    .amount {
      text-align: center;
      margin: 10px 0 20px;
    }
    
    .amount h1 {
      font-size: 38px;
      font-weight: 700;
      color: #333;
    }
    
    .amount small {
      display: inline-block;
      margin-top: 8px;
      background: #f4f4f4;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      color: #555;
    }
    
    .rate {
      background: #fff3e5;
      color: #c27c2c;
      padding: 8px 14px;
      font-size: 13px;
      border-radius: 8px;
      display: inline-block;
      margin-top: 12px;
    }
    
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    .form-group label {
      font-size: 13px;
      margin-bottom: 6px;
      color: #444;
    }
    
    input,
    select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      outline: none;
      transition: .2s;
    }
    
    input:focus,
    select:focus {
      border-color: #3b82f6;
    }
    
    .full {
      grid-column: span 2;
    }
    
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #2563eb;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: .2s;
    }
    
    button:hover {
      background: #1d4ed8;
    }
    
    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    
    @media(max-width:600px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      
      .full {
        grid-column: span 1;
      }
      
      .amount h1 {
        font-size: 30px;
      }
    }
  </style>
</head>

<body>
  
  <div class="modal">
    
    <div class="header">
      <div>
        <h3>🏦 Local Bank Transfer</h3>
        <span>Withdraw using local bank transfer</span>
      </div>
      <div class="close" onclick="closeModal()">✕</div>
    </div>
    
    <div class="amount">
      <h1 id="amount"></h1>
      <small>You have: $41,379</small>
      
      <div class="rate">
        ⚠ Current withdrawal rate: $1 = 0.00001438 BTC
      </div>
    </div>
    
    <form id="withdrawForm">
      
      <div class="form-grid">
        
        <div class="form-group">
          <label>Bank Account Holder Name</label>
          <input type="text" id="name" placeholder="Triumph">
        </div>
        
        <div class="form-group">
          <label>NUBAN / Account Number</label>
          <input type="number" id="account" placeholder="1234567890">
        </div>
        
        <div class="form-group">
          <label>Bank Name</label>
          <select id="bank">
            <option value="">Select Bank</option>
            <option>Bank of America</option>
            <option>Chase Bank</option>
            <option value="Skylight">Skylight</option>
            <option>Wells Fargo</option>
            <option>Citibank</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Currency</label>
          <select id="currency">
            <option value="">Select</option>
            <option>USD</option>
            <option value="BTC">BTC</option>
          </select>
        </div>
        
        <div class="form-group full">
          <label>Reason For Withdrawal</label>
          <select id="reason">
            <option value="">Select</option>
            <option>Business</option>
            <option>Personal</option>
            <option>Investment</option>
          </select>
        </div>
        
      </div>
      
      <button type="submit" id="submitBtn">Withdraw</button>
      
    </form>
    
  </div>
  
  <script>
    const amount = document.getElementById("amount");
    const form = document.getElementById("withdrawForm");
    const btn = document.getElementById("submitBtn");
    
    window.addEventListener('load', function() {
      let got = localStorage.getItem('amount') || "0";
      amount.textContent = `$${got}`;
    });
    
    function closeModal() {
      window.location.href = "Transfer.html";
    }
    
    form.addEventListener("submit", function(e) {
      e.preventDefault();
      
      const name = document.getElementById("name").value.trim();
      const account = document.getElementById("account").value.trim();
      const bank = document.getElementById("bank").value;
      const currency = document.getElementById("currency").value;
      const reason = document.getElementById("reason").value;
      
      // Validation
      if (!name || !account || !bank || !currency || !reason) {
        alert("⚠ Please fill all fields!");
        return;
      }
      
      // Show processing state
      btn.textContent = "Processing...";
      btn.disabled = true;
      
      // Simulate delay then redirect
      setTimeout(() => {
        window.location.href = "receipt.html";
btn.textContent = "Processing...";
      }, 3000); // 3 seconds
    });
  </script>
  
</body>

</html>
