<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw UI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#e5e5e5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.phone{
width:100%;
max-width:380px;
background:#000;
color:white;
border-radius:40px;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.icon{
width:40px;
height:40px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:18px;
cursor:pointer;
}

.title{
text-align:center;
font-size:18px;
margin-top:-35px;
}

.amount-section{
text-align:center;
margin:40px 0 20px;
}

.amount{
font-size:42px;
font-weight:600;
}

.available{
color:#888;
font-size:14px;
margin-top:8px;
}

.bank-card{
background:#111;
padding:15px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
margin-top:25px;
}

.bank-left{
display:flex;
align-items:center;
gap:10px;
}

.bank-icon{
width:35px;
height:35px;
background:#222;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
}

.continue{
width:100%;
background:#7ed8d0;
border:none;
padding:14px;
border-radius:30px;
margin-top:20px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.quick-buttons{
display:flex;
gap:10px;
margin-top:20px;
}

.quick-buttons button{
flex:1;
padding:10px;
border-radius:20px;
border:1px solid #222;
background:black;
color:white;
cursor:pointer;
}

.keypad{
margin-top:20px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.key{
background:#111;
padding:18px;
text-align:center;
border-radius:12px;
font-size:20px;
cursor:pointer;
}

.key:hover{
background:#222;
}

@media(max-width:420px){

.phone{
border-radius:0;
min-height:100vh;
}

}

</style>
</head>

<body>

<div class="phone">

<div class="header">
<div class="icon">←</div>
<div class="icon">🔔</div>
</div>

<div class="title">Withdraw</div>

<div class="amount-section">
<div class="amount">$<span id="amount">0</span></div>
<div class="available">Available for withdraw $34,875.77</div>
</div>

<div class="bank-card">
<div class="bank-left">
<div class="bank-icon">🏦</div>
<div>
<div>Bank Transfer</div>
<small style="color:#777">Saving (****7458)</small>
</div>
</div>
<div>⌄</div>
</div>

<button onclick="submit()" class="continue" id="btn">Continue</button>

<div class="quick-buttons">
<button onclick="setAmount(50)">50$</button>
<button onclick="setAmount(100)">100$</button>
<button onclick="setAmount(500)">500$</button>
<button onclick="setMax()">Max</button>
</div>

<div class="keypad">

<div class="key" onclick="addNumber(1)">1</div>
<div class="key" onclick="addNumber(2)">2</div>
<div class="key" onclick="addNumber(3)">3</div>

<div class="key" onclick="addNumber(4)">4</div>
<div class="key" onclick="addNumber(5)">5</div>
<div class="key" onclick="addNumber(6)">6</div>

<div class="key" onclick="addNumber(7)">7</div>
<div class="key" onclick="addNumber(8)">8</div>
<div class="key" onclick="addNumber(9)">9</div>

<div class="key" onclick="addDot()">.</div>
<div class="key" onclick="addNumber(0)">0</div>
<div class="key" onclick="deleteNum()">⌫</div>

</div>

</div>

<script>
const btn = document.getElementById("btn")

window.addEventListener('load', function(){
let got = localStorage.getItem('amount');
update()
})

let amountDisplay = document.getElementById("amount")
let value = localStorage.getItem('amount') || "";

function update(){
amountDisplay.innerText = value.toLocaleString() || 0;
}

function addNumber(num){
value += num.toLocaleString()
update()
}

function addDot(){
if(!value.includes(".")){
value += "."
update()
}
}

function deleteNum(){
value = value.slice(0,-1)
update()
}

function setAmount(num){
value = num.toLocaleString()
update()
}

function setMax(){
value = "34875.77"
update()
}

function submit(){
  if(parseInt(value) === 0 || value === ""){
    alert("empty");
    return;
  }
  btn.textContent = "Checking..."
  let money = [];
  money.push(parseInt(value));
  localStorage.setItem('amount', money)
  let got = localStorage.getItem('amount');

  setTimeout(()=>{
    
   window.location.href = "detail.html"
  }, 2000)

}
</script>

</body>
</html>
