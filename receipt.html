<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Failed UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: #f5f5f5;
}

/* Full screen gradient */
.screen {
  height: 100vh;
  background: linear-gradient(180deg, #f36b4f, #e53935);
  display: flex;
  align-items: center;
  justify-content: center;
}

.error-icon {
  width: 70px;
  height: 70px;
  background: white;
  color: #e53935;
  font-size: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Bottom Sheet */
.bottom-sheet {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 420px;
  left: 50%;
  transform: translateX(-50%) translateY(100%);
  background: #fff;
  border-radius: 20px 20px 0 0;
  padding: 20px;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
  transition: 0.4s ease;
}

.bottom-sheet.active {
  transform: translateX(-50%) translateY(0);
}

.sheet-header {
  text-align: center;
  position: relative;
}

.close {
  position: absolute;
  left: 0;
  top: 0;
  font-size: 20px;
  cursor: pointer;
}

.status-icon {
  margin: 10px auto;
  width: 50px;
  height: 50px;
  background: #ffe5e5;
  color: #e53935;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.view-details {
  background: #fce4ec;
  border: none;
  padding: 6px 12px;
  border-radius: 20px;
  margin-top: 10px;
  cursor: pointer;
}

/* Card */
.card {
  background: #f9f9f9;
  padding: 15px;
  border-radius: 12px;
  margin: 20px 0;
}

.card-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.card a {
  color: #007bff;
  text-decoration: none;
  font-size: 14px;
}

/* Buttons */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  font-size: 15px;
  cursor: pointer;
  border: none;
}
b{
  color: darkblue;
}

.secondary {
  background: #f1f1f1;
}

.primary {
  background: #1b8f5a;
  color: white;
}

/* Responsive */
@media (min-width: 500px) {
  .bottom-sheet {
    max-width: 400px;
  }
}
</style>

</head>
<body>

<div class="screen">
  <div class="error-icon">✕</div>
</div>

<div class="bottom-sheet" id="sheet">
  <div class="sheet-header">
    <span class="close" onclick="closeSheet()">✕</span>
    <div class="status-icon">✕</div>
    <h2>Transfer Failed</h2>
    <button class="view-details">View Details ▾</button>
  </div>

  <div class="card">
    <div class="card-header">
      <strong>Payment Failed</strong>
      <span id="day"></span>
    </div>
    <p>
      Payment failed out of low debit coin,Christina you'd need to buy a debit coin of $700 send a mail to <a href="#"><b>rpdbanking@gmail.com 
      </b></a> for the coin purchase
    </p>
    <a href="#">Know more</a>
  </div>

  <button class="secondary">Purchase Debit coin</button>
  <button class="secondary">Contact Support</button>

  <a href="Transfer.html"><button class="primary">Retry Order</button>
</div></a>

<script>
let day = document.getElementById("day")
let date = new Date().toLocaleDateString("en-GB", {
  day: "numeric",
  month: "short",
  year: "numeric",
});

day.textContent = date
window.onload = () => {
  setTimeout(() => {
    document.getElementById("sheet").classList.add("active");
  }, 500);
};

function closeSheet() {
  document.getElementById("sheet").classList.remove("active");
}
</script>

</body>
</html>
