<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Payment Success</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
  }

  body {
    background: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    background: #fff;
    width: 100%;
    max-width: 360px;
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  }

  .icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 20px;
    background: #e6f7ec;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .icon::before {
    content: "✔";
    font-size: 36px;
    color: #4CAF50;
  }

  h2 {
    font-size: 22px;
    margin-bottom: 8px;
  }

  .subtitle {
    color: #777;
    font-size: 14px;
    margin-bottom: 20px;
  }

  .user {
    background: #f8f9fb;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    margin: 0 auto 10px;
    background: url("https://i.pravatar.cc/100") center/cover;
  }

  .name {
    font-weight: 600;
  }

  .id {
    color: #4CAF50;
    font-size: 13px;
    margin-bottom: 10px;
  }

  .status {
    display: inline-block;
    border: 1px solid #4CAF50;
    color: #4CAF50;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
  }

  .amount {
    font-size: 28px;
    font-weight: bold;
    margin: 20px 0;
  }

  .details {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #666;
    margin-bottom: 6px;
  }

  .buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
  }

  .outline {
    border: 1px solid #4CAF50;
    background: transparent;
    color: #4CAF50;
  }

  .outline:hover {
    background: #e6f7ec;
  }

  .primary {
    background: #9BE15D;
    border: none;
    color: #000;
  }

  .primary:hover {
    background: #85d64d;
  }

  /* Responsive */
  @media (min-width: 768px) {
    .card {
      max-width: 420px;
      padding: 30px;
    }

    .amount {
      font-size: 32px;
    }
  }
</style>
</head>

<body>

<div class="card">
  <div class="icon"></div>

  <h2>Payment Successful!</h2>
  <p class="subtitle">Your money has been transferred successfully</p>

  <div class="user">
    <div class="avatar"></div>
    <div class="name">Josep Mount</div>
    <div class="id">10**2282</div>
    <div class="status">Transaction Status: Sent</div>
  </div>

  <div class="amount">$5,00.234</div>

  <div class="details">
    <span>Source of funds</span>
    <span>Debit Card</span>
  </div>

  <div class="details">
    <span>Transfer Fee</span>
    <span>$0</span>
  </div>

  <div class="buttons">
    <button class="outline" onclick="share()">Share</button>
    <button class="primary" onclick="goBack()">Go Back</button>
  </div>
</div>

<script>
  function share() {
    alert("Share functionality coming soon!");
  }

  function goBack() {
    window.history.back();
  }
</script>

</body>
</html>
